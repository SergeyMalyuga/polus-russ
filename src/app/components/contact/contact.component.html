<!-- contact.component.html -->
<section class="contact">
  <div class="container contact__inner">
    <h2 class="section-title">Связаться с нами</h2>
    <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="contact__form">
      <div class="form-group">
        <label for="name" class="form-label">Имя *</label>
        <input
          id="name"
          formControlName="name"
          class="form-input"
          type="text"
          placeholder="Ваше имя"
        />
        <small
          class="form-error"
          *ngIf="contactForm.get('name')?.invalid && contactForm.get('name')?.touched"
        >
          Введите имя (мин. 2 символа)
        </small>
      </div>

      <div class="form-group">
        <label for="email" class="form-label">Email *</label>
        <input
          id="email"
          formControlName="email"
          class="form-input"
          type="email"
          placeholder="you@company.ru"
        />
        <small
          class="form-error"
          *ngIf="contactForm.get('email')?.invalid && contactForm.get('email')?.touched"
        >
          Введите корректный email
        </small>
      </div>

      <div class="form-group">
        <label for="message" class="form-label">Сообщение *</label>
        <textarea
          id="message"
          formControlName="message"
          class="form-input form-input--textarea"
          placeholder="Расскажите о вашем проекте..."
        ></textarea>
        <small
          class="form-error"
          *ngIf="contactForm.get('message')?.invalid && contactForm.get('message')?.touched"
        >
          Сообщение должно содержать не менее 10 символов
        </small>
      </div>

      <button type="submit" class="btn btn--primary" [disabled]="contactForm.invalid">
        Отправить заявку
      </button>
    </form>

    <div class="contact__info">
      <p><strong>Polus Russ</strong></p>
      <p>📍 Москва, Россия</p>
      <p>✉️ <a href="mailto:info@polus-russ.ru">info&#64;polus-russ.ru</a></p>
      <p>📞 <a href="tel:+74951234567">+7 (495) 123-45-67</a></p>
    </div>
  </div>
</section>
